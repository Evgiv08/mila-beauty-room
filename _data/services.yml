list:
  - icon: scissors
    title: Стрижки & Укладки
    description: Женские стрижки любой сложности и профессиональные укладки для повседневного образа или особого события.Современные техники, индивидуальный подход и внимание к деталям.
  - icon: droplet
    title: Окрашивание
    description: Балаяж, омбре, airtouch, highlights, однотонное и сложное окрашивание с плавными переходами цвета. Бережные профессиональные составы, сохранение качества и блеска волос.
  - icon: sparkles
    title: Уход за волосами
    description: Маски, восстановление, увлажнение и уходовые процедуры для красоты и здоровья ваших волос. Индивидуальный подбор ухода в зависимости от типа и состояния волос.
