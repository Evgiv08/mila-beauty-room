# Decap CMS — конфигурация
# Документация: https://decapcms.org/docs/

backend:
  name: git-gateway
  branch: main

media_folder: "assets/images"
public_folder: "/assets/images"

collections:

  # ─── ХЕДЕР & НАВИГАЦИЯ ────────────────────────────────────────────
  - name: "header"
    label: "🔤 Хедер & Навигация"
    files:
      - name: "header"
        label: "Логотип и навигация"
        file: "_data/header.yml"
        fields:
          - { label: "Название салона (логотип)", name: "salon_name", widget: "string", required: false }
          - { label: "Кнопка «Записаться» в навбаре", name: "nav_book_label", widget: "string", required: false }
          - { label: "Подзаголовок в футере", name: "footer_tagline", widget: "text", required: false }

  # ─── ГЛАВНАЯ СТРАНИЦА ─────────────────────────────────────────────
  - name: "homepage"
    label: "🏠 Главная страница"
    files:

      - name: "hero"
        label: "Hero-секция (баннер)"
        file: "_data/hero.yml"
        fields:
          - { label: "Тег над заголовком", name: "eyebrow", widget: "string", required: false }
          - { label: "Заголовок", name: "title", widget: "string", required: false }
          - { label: "Текст описания", name: "description", widget: "text", required: false }
          - { label: "Фото", name: "image", widget: "image", required: false }
          - { label: "Кнопка 1 — золотая", name: "button_primary", widget: "string", required: false }
          - { label: "Кнопка 2 — контур", name: "button_secondary", widget: "string", required: false }
          - { label: "Рейтинг — число (напр. ★ 4.9)", name: "rating_num", widget: "string", required: false }
          - { label: "Рейтинг — подпись", name: "rating_label", widget: "string", required: false }
          - label: "Статистика (3 блока)"
            name: "stats"
            widget: "list"
            required: false
            fields:
              - { label: "Число", name: "num", widget: "string", required: false }
              - { label: "Подпись", name: "label", widget: "string", required: false }

      - name: "services"
        label: "Наши услуги — карточки"
        file: "_data/services.yml"
        fields:
          - label: "Список услуг"
            name: "list"
            widget: "list"
            required: false
            fields:
              - { label: "Иконка (emoji)", name: "icon", widget: "string", required: false }
              - { label: "Название", name: "title", widget: "string", required: false }
              - { label: "Описание", name: "description", widget: "text", required: false }

      - name: "about"
        label: "Блок «О нас»"
        file: "_data/about.yml"
        fields:
          - { label: "Тег над заголовком", name: "eyebrow", widget: "string", required: false }
          - { label: "Заголовок", name: "title", widget: "string", required: false }
          - { label: "Первый абзац", name: "text1", widget: "text", required: false }
          - { label: "Второй абзац", name: "text2", widget: "text", required: false }
          - { label: "Фото", name: "image", widget: "image", required: false }
          - { label: "Подпись кнопки галереи", name: "gallery_button", widget: "string", required: false }
          - label: "Преимущества (список)"
            name: "features"
            widget: "list"
            required: false

      - name: "cta"
        label: "CTA-блок «Готовы к новому образу?»"
        file: "_data/cta.yml"
        fields:
          - { label: "Заголовок", name: "title", widget: "string", required: false }
          - { label: "Текст под заголовком", name: "subtitle", widget: "text", required: false }
          - { label: "Текст кнопки", name: "button", widget: "string", required: false }

      - name: "contacts"
        label: "Контакты"
        file: "_data/contacts.yml"
        fields:
          - { label: "Название салона", name: "name", widget: "string", required: false }
          - { label: "Адрес", name: "address", widget: "string", required: false }
          - { label: "Телефон 1", name: "phone", widget: "string", required: false }
          - { label: "Телефон 2", name: "phone2", widget: "string", required: false }
          - { label: "Email", name: "email", widget: "string", required: false }
          - { label: "Часы работы (будни)", name: "hours_weekdays", widget: "string", required: false }
          - { label: "Часы работы (выходные)", name: "hours_weekends", widget: "string", required: false }
          - { label: "Ссылка Instagram", name: "instagram", widget: "string", required: false }
          - { label: "Ссылка Facebook", name: "facebook", widget: "string", required: false }

  # ─── СТРАНИЦА ПРАЙС-ЛИСТ ──────────────────────────────────────────
  - name: "price_page"
    label: "💰 Прайс-лист"
    files:

      - name: "price_hero"
        label: "Шапка страницы"
        file: "_data/page_price.yml"
        fields:
          - { label: "Тег над заголовком", name: "eyebrow", widget: "string", required: false }
          - { label: "Заголовок страницы", name: "title", widget: "string", required: false }
          - { label: "Подзаголовок", name: "subtitle", widget: "text", required: false }
          - { label: "Сноска внизу (*)", name: "footer_note", widget: "text", required: false }
          - { label: "Кнопка записи", name: "cta_button", widget: "string", required: false }

      - name: "price_list"
        label: "Категории и цены"
        file: "_data/price.yml"
        fields:
          - label: "Категории услуг"
            name: "categories"
            widget: "list"
            fields:
              - { label: "Иконка (emoji)", name: "icon", widget: "string", required: false }
              - { label: "Название категории", name: "title", widget: "string", required: false }
              - label: "Позиции"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Название услуги", name: "name", widget: "string", required: false }
                  - { label: "Описание", name: "description", widget: "string", required: false }
                  - { label: "Длительность", name: "duration", widget: "string", required: false }
                  - { label: "Цена", name: "price", widget: "string", required: false }

  # ─── СТРАНИЦА ГАЛЕРЕЯ ─────────────────────────────────────────────
  - name: "gallery_page"
    label: "🖼️ Галерея"
    files:

      - name: "gallery_hero"
        label: "Шапка страницы"
        file: "_data/page_gallery.yml"
        fields:
          - { label: "Тег над заголовком", name: "eyebrow", widget: "string", required: false }
          - { label: "Заголовок страницы", name: "title", widget: "string", required: false }
          - { label: "Подзаголовок", name: "subtitle", widget: "text", required: false }
          - { label: "Заголовок сетки фото", name: "grid_title", widget: "string", required: false }
          - { label: "CTA — заголовок", name: "cta_title", widget: "string", required: false }
          - { label: "CTA — текст", name: "cta_subtitle", widget: "text", required: false }
          - { label: "CTA — кнопка", name: "cta_button", widget: "string", required: false }

      - name: "gallery_data"
        label: "Фотографии"
        file: "_data/gallery.yml"
        fields:
          - label: "Карусель (слайдер)"
            name: "carousel"
            widget: "list"
            required: false
            fields:
              - { label: "Изображение", name: "image", widget: "image", required: false }
              - { label: "Категория (подпись)", name: "category_label", widget: "string", required: false }
              - { label: "Текст подписи", name: "caption", widget: "string", required: false }
          - label: "Сетка фотографий"
            name: "grid"
            widget: "list"
            required: false
            fields:
              - { label: "Превью", name: "image", widget: "image", required: false }
              - { label: "Полный размер", name: "image_full", widget: "image", required: false }
              - { label: "Alt-текст", name: "alt", widget: "string", required: false }
              - label: "Категория"
                name: "category"
                widget: "select"
                required: false
                options:
                  - { label: "Волосы", value: "hair" }
                  - { label: "Ногти", value: "nails" }
                  - { label: "Макияж", value: "makeup" }
                  - { label: "Уход", value: "care" }
